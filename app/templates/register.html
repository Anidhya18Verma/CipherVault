{% extends 'base.html' %}
{% block title %}Register – CipherVault{% endblock %}
{% block content %}

<section class="auth-section">
    <div class="auth-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>
    <div class="auth-card">
        <div class="auth-header">
            <a href="/" class="auth-logo"><span class="logo-icon">⬡</span> CipherVault</a>
            <h1>Create your vault</h1>
            <p>Free forever. No credit card required.</p>
        </div>

        <div id="auth-error" class="alert alert-error hidden"></div>
        <div id="auth-success" class="alert alert-success hidden"></div>

        <form id="register-form" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="choose_a_username" required minlength="3" autocomplete="username">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrap">
                    <input type="password" id="password" name="password" placeholder="min. 6 characters" required minlength="6" autocomplete="new-password">
                    <button type="button" class="toggle-pw" onclick="togglePassword('password')">👁</button>
                </div>
            </div>
            <button type="submit" class="btn-primary btn-lg btn-full" id="register-btn">
                <span id="register-btn-text">Create Vault →</span>
            </button>
        </form>

        <p class="auth-footer">Already have an account? <a href="/login">Login →</a></p>
    </div>
</section>

<script>
async function handleRegister(e) {
    e.preventDefault();
    const btn = document.getElementById('register-btn');
    const btnText = document.getElementById('register-btn-text');
    const errorDiv = document.getElementById('auth-error');
    const successDiv = document.getElementById('auth-success');

    errorDiv.classList.add('hidden');
    successDiv.classList.add('hidden');
    btn.disabled = true;
    btnText.textContent = 'Creating vault...';

    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    try {
        const res = await fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, email, password })
        });
        const data = await res.json();

        if (res.ok) {
            localStorage.setItem('cv_token', data.token);
            localStorage.setItem('cv_user', JSON.stringify(data.user));
            successDiv.textContent = '✓ Vault created! Redirecting...';
            successDiv.classList.remove('hidden');
            setTimeout(() => window.location.href = '/dashboard', 800);
        } else {
            errorDiv.textContent = '✕ ' + (data.error || 'Registration failed');
            errorDiv.classList.remove('hidden');
            btn.disabled = false;
            btnText.textContent = 'Create Vault →';
        }
    } catch (err) {
        errorDiv.textContent = '✕ Network error. Please try again.';
        errorDiv.classList.remove('hidden');
        btn.disabled = false;
        btnText.textContent = 'Create Vault →';
    }
}

function togglePassword(id) {
    const input = document.getElementById(id);
    input.type = input.type === 'password' ? 'text' : 'password';
}
</script>
{% endblock %}
